[pytest]
# 测试文件匹配规则
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 将 backend 加入模块搜索路径，使 from app import ... 无需额外设置 PYTHONPATH
pythonpath = .

# Flask 测试配置
filterwarnings =
    ignore::DeprecationWarning

# 覆盖率（可选，后续开启）
# addopts = --cov=app --cov-report=term-missing
