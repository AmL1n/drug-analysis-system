version: '3.8'

services:
  backend:
    build: ./backend
    container_name: drug-check-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///app/data/drug_check.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-please-change-this-secret-in-production}
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-in-production}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: drug-check-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
