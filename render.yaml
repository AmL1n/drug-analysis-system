# Render Blueprint
# 部署前请先在 Render Dashboard 创建 Blueprint 并关联本仓库。
# JWT_SECRET_KEY 与 SECRET_KEY 已配置为 Render 自动生成；
# 如需自定义，可在 Dashboard 对应服务的环境变量中覆盖。
#
# 注意：free 套餐不支持挂载 Disk，因此 SQLite 数据保存在容器临时存储中，
# 重新部署后会丢失。如需持久化，请升级到 starter 及以上套餐并恢复 disk 配置，
# 或将 DATABASE_URL 改为 Render PostgreSQL 等外部数据库。

services:
  - type: web
    name: drug-analysis-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        # SQLAlchemy 中 SQLite 绝对路径需要 4 个斜杠：sqlite:////<绝对路径>
        value: sqlite:////app/data/drug_check.db
      - key: CORS_ORIGINS
        value: https://drug-analysis-frontend-23n3.onrender.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true

  # Render 的 static site 属于 web 类型，并设置 runtime: static
  - type: web
    name: drug-analysis-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # 使用相对路径 /api，由 Render 的 rewrite 规则代理到后端，避免硬编码后端域名
      - key: VITE_API_BASE_URL
        value: /api
    routes:
      # API 请求代理到后端服务（* 保留原路径）
      # 注意：Render 可能给服务名加后缀，这里使用实际后端地址
      - type: rewrite
        source: /api/*
        destination: https://drug-analysis-backend-66uu.onrender.com/api/*
      # Vue Router 的 SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
